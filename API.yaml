openapi: 3.0.0
info:
  title: API de Monitoramento de Plantas
  description: API para gerenciar usuários, plantas e leituras dos sensores em um sistema de monitoramento.
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: Servidor local para desenvolvimento

paths:
  /usuarios:
    post:
      summary: Cadastrar um novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                email:
                  type: string
                  format: email
                senha:
                  type: string
                  format: password
              required:
                - nome
                - email
                - senha
      responses:
        '201':
          description: Usuário criado com sucesso
        '400':
          description: Erro na criação do usuário

    get:
      summary: Listar todos os usuários
      responses:
        '200':
          description: Lista de usuários cadastrados
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    nome:
                      type: string
                    email:
                      type: string

  /sensores:
    get:
      summary: Listar leituras dos sensores com filtro por data
      parameters:
        - in: query
          name: data_inicio
          schema:
            type: string
            format: date
          description: Data de início para filtrar as leituras
        - in: query
          name: data_fim
          schema:
            type: string
            format: date
          description: Data de fim para filtrar as leituras
      responses:
        '200':
          description: Lista de leituras dos sensores
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    temperatura_ar:
                      type: number
                    umidade_ar:
                      type: number
                    umidade_solo:
                      type: string
                    timestamp:
                      type: string
                      format: date-time
                    semana:
                      type: integer

    post:
      summary: Registrar uma nova leitura dos sensores
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                temperatura_ar:
                  type: number
                umidade_ar:
                  type: number
                umidade_solo:
                  type: string
                timestamp:
                  type: string
                  format: date-time
                semana:
                  type: integer
              required:
                - temperatura_ar
                - umidade_ar
                - umidade_solo
                - timestamp
                - semana
      responses:
        '201':
          description: Leitura registrada com sucesso
        '400':
          description: Erro ao registrar a leitura

  /plantas:
    post:
      summary: Cadastrar uma nova planta
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nome:
                  type: string
                especie:
                  type: string
                descricao:
                  type: string
              required:
                - nome
                - especie
      responses:
        '201':
          description: Planta cadastrada com sucesso
        '400':
          description: Erro no cadastro da planta

    get:
      summary: Listar todas as plantas
      responses:
        '200':
          description: Lista de plantas cadastradas
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    nome:
                      type: string
                    especie:
                      type: string
                    descricao:
                      type: string
